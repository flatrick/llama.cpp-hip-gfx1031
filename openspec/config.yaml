schema: spec-driven

context: |
  ## Purpose
  This repo is a living compatibility guide for running OpenCode against a local
  llama.cpp server on an AMD RX 6700 XT (gfx1031) on Arch Linux / EndeavourOS.
  The current documented path is container-first: build `llama-cpp-gfx1031:latest`
  with `build.docker-rocm.sh`, then run one of the `*.docker-rocm.sh` launchers.
  It is verified only for gfx1031. The setup can break due to Arch's rolling-release
  pace, ROCm container updates, llama.cpp changes, and HuggingFace repo changes.

  ## Hardware
  - GPU: AMD RX 6700 XT 12GB (gfx1031)
  - CPU: AMD Ryzen 5 5600X
  - RAM: 32GB

  ## gfx1031 / gfx1030 Relationship
  gfx1031 (RX 6700 XT) and gfx1030 (RX 6800 XT) share the same RDNA2 ISA but ROCm treats
  them differently. The current repo works around that by compiling llama.cpp for
  gfx1030 inside the container and baking in `HSA_OVERRIDE_GFX_VERSION=10.3.0`:
  - [2026-03] rocBLAS ships broken or missing gfx1031 kernel binaries; gfx1030 is the stable path
  - `Dockerfile.rocm` sets `HSA_OVERRIDE_GFX_VERSION=10.3.0` and `-DAMDGPU_TARGETS=gfx1030`
  - Do not suggest the old host-native `llama.cpp-hip` / AUR flow as the default path for this repo
  - If `Dockerfile.rocm` changes, rebuild with `bash build.docker-rocm.sh --force`

  ## Breakage Taxonomy
  Things that can break this setup independently:
  - Linux kernel / permissions change: `/dev/kfd`, `/dev/dri`, `video`, or `render` access may break
  - ROCm container base update: `rocm/dev-ubuntu-24.04:latest` may change build or runtime behaviour
  - llama.cpp submodule update: CLI flags, performance, or ROCm behaviour may shift
  - Dockerfile change: `AMDGPU_TARGETS`, `LLAMA_CURL`, or entrypoint behaviour may change
  - HuggingFace model repo change: model URLs, filenames, or templates may move
  - VRAM tuning change: `--ctx-size` / KV-cache settings can OOM even when the build succeeds

  ## Current Launcher Status
  | Script                        | Status       | Reason                                          |
  |-------------------------------|--------------|-------------------------------------------------|
  | build.docker-rocm.sh          | ✅ working    | Builds or reuses `llama-cpp-gfx1031:latest`     |
  | Q4_K_M.4_0q.docker-rocm.sh    | ✅ working    | Main q4_0 profile; longest documented ctx       |
  | Q4_K_M.8_0q.docker-rocm.sh    | ✅ working    | Main q8_0 profile; slightly faster decode       |
  | UD-Q4_K_XL.4_0q.docker-rocm.sh| ✅ working    | Higher-quality weights with q4_0 KV             |
  | UD-Q4_K_XL.8_0q.docker-rocm.sh| ✅ working    | Higher-quality weights with q8_0 KV             |
  | chatml.Q4_K_M.docker-rocm.sh  | ⚠️ secondary  | Present for chatml-specific runs; not the main README path |
  | chatml.UD-Q4_K_XL.docker-rocm.sh | ⚠️ secondary | Present for chatml-specific runs; not the main README path |

  ## Software Stack
  - Docker or Podman: required on the host; the container brings ROCm userspace and `llama-server`
  - `Dockerfile.rocm`: builds llama.cpp from the pinned submodule for `gfx1030`
  - `llama.cpp-src/`: git submodule used as the source tree for container builds
  - OpenCode + @ai-sdk/openai-compatible: LLM client
  - Host GPU driver: Arch / EndeavourOS kernel with `amdgpu` access to `/dev/kfd` and `/dev/dri`

  ## Model: Qwen3.5-9B
  - Architecture: hybrid SSM/attention (Gated Delta Net) — NOT a pure transformer
  - No SWA (n_swa=0, is_swa_any=0) — do not use --swa-full
  - Only 8 of 32 layers have KV cache; KV stays small relative to context size
  - Thinking mode is always on; needs max_tokens ≥ 1024 for simple tasks, ≥ 8192 for code
  - Recurrent state cannot be partially cached — prompt cache only helps for exact prefix reuse
  - Launchers use `--model-url` directly; `LLAMA_CURL=ON` in the container build is required
  - Repo-standard runtime flags: `--flash-attn on`, `--batch-size 1024`, `--ubatch-size 256`, `--parallel 1`, `--no-warmup`, `-cram 2048`

  ## VRAM Budget (gfx1031, 12 GB card, ~11 GB safety target)
  Current documented launch profiles:
  - `Q4_K_M.4_0q.docker-rocm.sh`: ctx=57344, q4_0 KV, ~10.85 GB peak
  - `Q4_K_M.8_0q.docker-rocm.sh`: ctx=49152, q8_0 KV, ~10.67 GB peak
  - `UD-Q4_K_XL.4_0q.docker-rocm.sh`: ctx=49152, q4_0 KV, ~10.52 GB peak
  - `UD-Q4_K_XL.8_0q.docker-rocm.sh`: ctx=45056, q8_0 KV, ~10.66 GB peak
  q8_0 decodes faster but costs more KV VRAM; q4_0 allows a larger context window.

  ## Decision Logic
  - Image missing → run `bash build.docker-rocm.sh`
  - `Dockerfile.rocm` or `llama.cpp-src` changed → run `bash build.docker-rocm.sh --force`
  - Need longer context → prefer the `*.4_0q.docker-rocm.sh` profiles
  - Need slightly faster decode → prefer the `*.8_0q.docker-rocm.sh` profiles
  - Need better quality weights → choose `UD-Q4_K_XL.*`; need lower VRAM pressure → choose `Q4_K_M.*`
  - Suggesting host-native ROCm / `llama.cpp-hip` as the default workflow → treat as stale for this repo
  - HuggingFace download inside the container → requires `LLAMA_CURL=ON` and the current `--model-url` path

  ## Conventions
  - Build script: `build.docker-rocm.sh`
  - Standard launchers: `<weights>.<kv>.docker-rocm.sh`
  - ChatML launchers: `chatml.<weights>.docker-rocm.sh`
  - Docker/Podman scripts bind `0.0.0.0:8080` and auto-detect `podman` or `docker`
  - Model cache: `~/.cache/huggingface/` and `~/.cache/llama.cpp/` are mounted into the container
  - Image name: `llama-cpp-gfx1031:latest`
  - Container runtime auto-detected: $(command -v podman || command -v docker)

rules:
  proposal:
    - Keep proposals concise — this is a small ops/infra repo, not a product
    - Always note which scripts are affected (`build.docker-rocm.sh`, standard `*.docker-rocm.sh`, or `chatml.*.docker-rocm.sh`)
    - State whether the change affects the host system, the container, or both
  specs:
    - Use scenario-based verification (run script X, observe log output Y) not unit test language
    - Each scenario should be reproducible on a fresh Arch/EOS install with the target hardware
    - Prefer WHEN/THEN scenarios that reference specific log lines or exit codes as evidence
  design:
    - Only create design.md for changes spanning multiple scripts or introducing new Docker patterns
    - Single-script or single-config changes do not need a design doc
    - Always note the ROCm version and llama.cpp build number the design was validated against
  tasks:
    - Each task should map to a single script or config file change
    - Include a verification step (run the affected script, check the log)
    - Date-stamp any task that documents a version-specific workaround
